name: Selenium Test Suite

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          grep -iv "pywin32" requirements.txt > requirements_linux.txt
          python -m pip install -r requirements_linux.txt

      - name: Verify installation
        run: |
          python --version
          python -m pip --version
          python -m pytest --version

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Create reports directory
        run: |
          mkdir -p reports

      - name: Run tests
        run: |
          python -m pytest \
            --html=reports/test_report.html \
            -s \
            -v \
            --self-contained-html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test_report.html